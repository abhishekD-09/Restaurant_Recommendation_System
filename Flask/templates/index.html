<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDining AI | Culinary Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body class="bg-[#05070a] text-slate-300 min-h-screen flex flex-col overflow-x-hidden">

    <div class="absolute top-[-20%] right-[-10%] w-[500px] h-[500px] bg-indigo-900/30 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-emerald-900/20 rounded-full blur-[100px] pointer-events-none"></div>

    <nav class="relative z-10 px-10 py-8 flex justify-between items-center max-w-7xl mx-auto w-full">
        <div class="text-xl font-bold tracking-widest text-white flex items-center gap-3">
            <div class="p-2 bg-indigo-500/10 border border-indigo-500/20 rounded-xl">
                <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                </svg>
            </div>
            SMART<span class="text-indigo-400">DINING</span>
        </div>
        <div class="flex gap-8 items-center">
            <a href="/" class="text-xs uppercase tracking-widest font-semibold text-white border-b-2 border-indigo-500 pb-1">Discovery</a>
            <a href="/web" class="text-xs uppercase tracking-widest font-semibold text-slate-500 hover:text-indigo-400 transition-all">Engine</a>
        </div>
    </nav>

    <main class="relative z-10 flex-grow flex items-center justify-center px-6">
        <div class="glass rounded-[2rem] p-10 md:p-20 max-w-5xl w-full text-left grid md:grid-cols-2 gap-12 items-center">
            
            <div>
                <div class="inline-flex items-center gap-3 px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">
                    <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span>
                    Neural Core Active
                </div>
                
                <h1 class="text-5xl md:text-6xl font-extrabold text-white leading-[1.1] mb-6">
                    Taste is <br>
                    <span class="text-indigo-400 italic font-light">Computational.</span>
                </h1>
                
                <p class="text-slate-400 text-lg mb-10 leading-relaxed border-l-2 border-slate-800 pl-6">
                    Leveraging advanced TF-IDF vectorization to decode the sentiment and structure of thousands of culinary experiences. Find exactly what you crave.
                </p>
                
                <a href="/web" class="glow inline-flex items-center justify-center px-10 py-4 text-xs font-black uppercase tracking-widest text-white bg-indigo-600 rounded-lg hover:bg-indigo-500 transition-all group">
                    Enter Inference Portal
                    <svg class="w-4 h-4 ml-3 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                </a>
            </div>

            <div class="hidden md:block relative">
                <div class="aspect-square rounded-3xl bg-gradient-to-br from-indigo-500/20 to-purple-500/0 border border-white/10 flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#4f46e5 1px, transparent 1px); background-size: 20px 20px;"></div>
                    <div class="text-6xl">🍽️</div>
                    <div class="absolute bottom-4 left-4 right-4 h-24 glass rounded-xl border border-white/5 p-4">
                        <div class="h-2 w-1/2 bg-indigo-500/40 rounded mb-2"></div>
                        <div class="h-2 w-3/4 bg-slate-700/40 rounded mb-2"></div>
                        <div class="h-2 w-1/3 bg-slate-700/40 rounded"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="relative z-10 p-8 text-center text-[10px] uppercase tracking-[0.3em] text-slate-600">
        &copy; 2026 Semantic Gastronomy Systems
    </footer>

</body>
</html>
